<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Strength Training</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
            background-color: #f4f4f4;
            text-align: center;
        }
        header {
            background: #222;
            color: white;
            padding: 20px;
            font-size: 24px;
            font-weight: bold;
        }
        .container {
            max-width: 900px;
            margin: 20px auto;
            padding: 20px;
            background: white;
            border-radius: 10px;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.1);
        }
        .exercise {
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: #e8e8e8;
            padding: 15px;
            margin: 15px 0;
            border-radius: 8px;
        }
        .exercise img {
            width: 180px;
            height: 180px;
            border-radius: 5px;
        }
        .timer {
            margin-top: 10px;
        }
        button {
            padding: 10px 20px;
            margin: 5px;
            border: none;
            background: #28a745;
            color: white;
            cursor: pointer;
            border-radius: 5px;
        }
        button:hover {
            background: #218838;
        }
        button:disabled {
            background: #ccc;
            cursor: not-allowed;
        }
    </style>
</head>
<body>
    <header>Strength Training Workouts</header>
    <div class="container">
        <h2>Common Strength Workouts</h2>
        <div class="exercise" id="pushups">
            <img src="https://media.giphy.com/media/h1Q4103YvHoRcfu2Dn/giphy.gif?cid=790b7611ec9lx8z6g2nf2zhx62xj9oqnh4z9fk1bpixkoj83&ep=v1_gifs_search&rid=giphy.gif&ct=g" alt="Push-Ups Animation">
            <div>
                <strong>Push-Ups:</strong> Builds upper body and core strength.
                <div class="timer">
                    <input type="time" id="pushupTimer" step="1">
                    <button onclick="startTimer('pushupTimer', 'pushupCountdown')">Start</button>
                    <button onclick="resetTimer('pushupCountdown')">Reset</button>
                    <h2 id="pushupCountdown">00:00:00</h2>
                </div>
            </div>
        </div>
        <div class="exercise" id="squats">
            <img src="https://media1.giphy.com/media/v1.Y2lkPTc5MGI3NjExd2tncDhvMzU1MXZoc2I0dmE4dzM1Ymtzbmt3cm5jejRyYjdvYW02MSZlcD12MV9pbnRlcm5hbF9naWZfYnlfaWQmY3Q9Zw/322W9dk1XC1esd8uyd/giphy.gif" alt="Squats Animation">
            <div>
                <strong>Squats:</strong> Strengthens legs and glutes.
                <div class="timer">
                    <input type="time" id="squatTimer" step="1">
                    <button onclick="startTimer('squatTimer', 'squatCountdown')">Start</button>
                    <button onclick="resetTimer('squatCountdown')">Reset</button>
                    <h2 id="squatCountdown">00:00:00</h2>
                </div>
            </div>
        </div>
        <div class="exercise" id="deadlifts">
            <img src="https://media.giphy.com/media/xT9IgG50Fb7Mi0prBC/giphy.gif" alt="Deadlifts Animation">
            <div>
                <strong>Deadlifts:</strong> Engages multiple muscle groups for strength.
                <div class="timer">
                    <input type="time" id="deadliftTimer" step="1">
                    <button onclick="startTimer('deadliftTimer', 'deadliftCountdown')">Start</button>
                    <button onclick="resetTimer('deadliftCountdown')">Reset</button>
                    <h2 id="deadliftCountdown">00:00:00</h2>
                </div>
            </div>
        </div>
        <div class="exercise" id="plank">
            <img src="https://media.giphy.com/media/l1J9EdzfOSgfyueLm/giphy.gif" alt="Plank Animation">
            <div>
                <strong>Plank:</strong> Strengthens core and improves endurance.
                <div class="timer">
                    <input type="time" id="plankTimer" step="1">
                    <button onclick="startTimer('plankTimer', 'plankCountdown')">Start</button>
                    <button onclick="resetTimer('plankCountdown')">Reset</button>
                    <h2 id="plankCountdown">00:00:00</h2>
                </div>
            </div>
        </div>
    </div>
    
    <script>
        function startTimer(timerId, countdownId) {
            let timeInput = document.getElementById(timerId).value;
            let [hours, minutes, seconds] = timeInput.split(':').map(Number);
            let totalTime = hours * 3600 + minutes * 60 + seconds;
            
            if (totalTime <= 0) return;
            
            document.querySelector(`button[onclick="startTimer('${timerId}', '${countdownId}')"]`).disabled = true;
            
            let timer = setInterval(() => {
                if (totalTime <= 0) {
                    clearInterval(timer);
                    document.querySelector(`button[onclick="startTimer('${timerId}', '${countdownId}')"]`).disabled = false;
                    alert("Time's up!");
                    return;
                }
                totalTime--;
                let displayHours = Math.floor(totalTime / 3600);
                let displayMinutes = Math.floor((totalTime % 3600) / 60);
                let displaySeconds = totalTime % 60;
                document.getElementById(countdownId).textContent = `${displayHours.toString().padStart(2, '0')}:${displayMinutes.toString().padStart(2, '0')}:${displaySeconds.toString().padStart(2, '0')}`;
            }, 1000);
        }
        
        function resetTimer(countdownId) {
            document.getElementById(countdownId).textContent = "00:00:00";
        }
    </script>
</body>
</html>
